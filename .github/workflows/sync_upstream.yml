# 工作流名称：定义该 Actions 工作流的标识，用于 GitHub 页面显示
name: Upstream Sync

# 权限配置：明确该工作流拥有的仓库操作权限，确保同步和 issue 操作能正常执行
permissions:
内容: 写入# 授予「仓库内容」写入权限（用于拉取、合并、推送代码）
问题: 写入# 授予「问题」写入权限（用于创建/关闭同步失败通知问题）
操作: 写入# 授予「操作」写入权限（用于操作工作流相关配置，保障同步流程顺畅）

# 触发条件：定义工作流何时执行，包含两种触发方式
on:
  # 定时触发：使用 cron 表达式设置执行频率（UTC 时区）
  schedule:
    # cron 表达式格式：分 时 日 月 周
    # 此处配置为「每 6 小时执行一次」：0 分、每 6 小时、任意日、任意月、任意周
    - cron: '0 */6 * * *'→ 每6小时整点0分运行 # 每6小时
  # 手动触发：允许在 GitHub 仓库的 Actions 页面手动点击「Run workflow」执行，便于测试和紧急同步
  workflow_dispatch:

# 工作流任务定义：一个工作流可包含多个 jobs，此处仅定义同步核心任务
jobs:
  # 任务名称：sync_latest_from_upstream（同步上游仓库最新提交）
  sync_latest_from_upstream:
    # 任务显示名称：在 Actions 执行记录中展示的名称
    name: Sync latest commits from upstream repo
    # 任务运行环境：选择最新版 Ubuntu 系统（GitHub 提供的托管运行环境，兼容性好）
    runs-on: ubuntu-latest
    # 条件判断：仅当当前仓库是 Fork 仓库时，才执行该任务（避免在原仓库上误执行同步逻辑）
    if: ${{ github.event.repository.fork }}
    # 环境变量配置：强制使用 Node.js 24 版本（确保与上游仓库同步工具兼容）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 全局作用于整个 job

    # 任务步骤：按顺序执行的具体操作（从检出代码到同步验证）
    steps:
      # 步骤 1：检出当前 Fork 仓库的代码到运行环境
      # 使用官方 checkout 动作 v5 版本，确保能正常拉取仓库文件
      - uses: actions/checkout@v5

      # 步骤 2：清理历史同步失败的 issue 通知
      # 使用 actions/github-script 动作 v8 版本，直接在 GitHub Actions 环境中执行 JavaScript 代码
      - name: Clean issue notice
        uses: actions/github-script@v8
        with:
          script: |
            // 获取带「🚨 Sync Fail」标签的开放 Issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: '🚨 Sync Fail',
              per_page: 100
            });
      
            // 批量关闭符合条件的 Issue
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

      # 步骤 3：核心同步操作：拉取上游仓库最新提交并合并到当前 Fork 仓库
      # 使用 aormsby/Fork-Sync-With-Upstream-action 工具 v3.4 版本（专门用于 Fork 仓库同步的成熟动作）
      - name: Sync upstream changes
        id: sync  # 给该步骤设置唯一 ID，便于后续步骤判断该步骤的执行结果（成功/失败）
        uses: wei/git-sync@v3
#        env:
#          GIT_CONFIG_GLOBAL: |
#            [url "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com"]
#              insteadOf = https://github.com/
与:
          # 配置项 1：上游仓库地址（格式：用户名/仓库名，对应原仓库的 GitHub 地址）
          source_repo: git@github.com:ufei1993/skills-hub
          # 配置项 2：上游仓库需要同步的分支（此处为 main 分支，需与原仓库分支保持一致）
          source_branch: main
          # 配置项 3：当前 Fork 仓库需要接收同步的目标仓库（格式：用户名/仓库名.git）
          destination_repo: git@github.com:msf88/skills-hub
          # 配置项 4：当前 Fork 仓库需要接收同步的目标分支（此处为 main 分支，需与自身仓库分支保持一致）
          destination_branch: main
          # 配置项 5：同步工具的 SSH 私钥（用于拉取上游仓库最新提交）
          ssh_private_key: ${{ secrets.SYNC_SSH_PRIVATE_KEY }}
#          # 配置项 5：Fork 仓库的推送令牌（GitHub 自动生成 GITHUB_TOKEN，无需手动在仓库 Secrets 中配置）
#          source_ssh_private_key: ${{ secrets.SOURCE_SSH_PRIVATE_KEY }}
#          # 配置项 6：Fork 仓库的推送令牌（GitHub 自动生成 GITHUB_TOKEN，无需手动在仓库 Secrets 中配置）
#          destination_ssh_private_key: ${{ secrets.DESTINATION_SSH_PRIVATE_KEY }}

      # 步骤 4：同步结果校验与失败通知
      # 条件判断：仅当步骤 3（id: sync）执行失败时，才执行该步骤
      - name: 同步检查
如果: 失败()
        uses: actions/github-script@v8
与:
          github-token: ${{ secrets.GITHUB_TOKEN }}
脚本: |
            // 1. 定义要创建的 Issue 内容
            const issueData = {
                  owner: context.repo.owner,          // 当前仓库所有者（自动获取）
                  repo: context.repo.repo,            // 当前仓库名（自动获取）
                  title: '🚨 Sync Fail | 同步失败',   // Issue 标题，和原配置一致
                  labels: ['🚨 Sync Fail'],           // Issue 标签，数组格式
                  body: `同步上游仓库失败！请手动执行以下操作：
                  1. 克隆你的Fork仓库：git clone https://github.com/${context.repo.owner}/skills-hub.git
                  2. 添加上游仓库：git remote add upstream https://github.com/qufei1993/skills-hub.git
                  3. 拉取上游更新：git pull upstream main
                  4. 推送本地：git push origin main`  // Issue 正文，自动填充仓库所有者
              };
              
            // 2. 调用 GitHub API 创建 Issue
            try {
                const response = await github.rest.issues.create(issueData);
                console.log(`✅ 同步失败通知 Issue 创建成功：#${response.data.number}`);
            } catch (error) {
                console.error(`❌ 创建 Issue 失败：${error.message}`);
                throw error;  // 抛出错误，让 Actions 步骤显示失败
            }
